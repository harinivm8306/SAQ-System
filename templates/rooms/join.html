{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-card">
    <h2>Join a Room</h2>
    <p class="subtitle">Enter the 8-digit code to join the room.</p>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="code">Room Code</label>
            <input type="text" id="code" name="code" placeholder="e.g. 12345678" value="{{ code }}" maxlength="8"
                required>
        </div>

        {% if error %}
        <div class="form-error" style="margin-bottom: 20px;">
            {{ error }}
        </div>
        {% endif %}

        <button type="submit" class="btn-primary">Join Room</button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <p style="color: #888; font-size: 14px;">Want to host your own? <a href="{% url 'create_room' %}" style="color: #ff8c00; font-weight: 700; text-decoration: none;">Create a Room</a></p>
    </div>

    <div class="auth-footer">
        <p>Don't have a code? <a href="{% url 'dashboard' %}">Back to Dashboard</a></p>
    </div>
</div>

<style>
    .form-group label {
        font-size: 14px;
        margin-bottom: 8px;
        color: #bdbdbd;
    }

    .form-group input {
        text-align: center;
        font-size: 20px;
        letter-spacing: 5px;
        font-weight: 700;
        padding: 15px;
        background: #0f0f0f;
        border: 2px solid #333;
        border-radius: 12px;
        transition: border-color 0.3s;
    }

    .form-group input:focus {
        border-color: #ff8c00;
        outline: none;
    }
</style>
{% endblock %}
