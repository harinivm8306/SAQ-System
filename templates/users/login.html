{% extends "base.html" %}

{% block content %}
<div class="auth-card">
  <h2>Welcome Back</h2>
  <p class="subtitle">Login to continue</p>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" name="username" id="username" placeholder="Enter your username" required />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" name="password" id="password" pattern="^(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}$"
        title="Password must be at least 8 characters long, contain one uppercase letter and one special character."
        placeholder="Enter your password" required />
    </div>
    <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot Password?</a>

    <div class="form-group remember-me">
      <input type="checkbox" name="remember_me" id="remember_me" />
      <label for="remember_me">Remember me</label>
    </div>

    <button type="submit" class="btn-primary">Login</button>

    {% if error %}
    <p class="form-error">{{ error }}</p>
    {% endif %}
  </form>

  <p class="auth-switch">
    Don’t have an account?
    <a href="{% url 'register' %}">Sign up</a>
  </p>
</div>
{% endblock %}
